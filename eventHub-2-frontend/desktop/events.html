<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHub — Events</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script src="js/shared-layout.js"></script>
<script>
(async () => {
  await buildLayout('nav-events');

  const content = document.getElementById('page-content');

  content.innerHTML = `
    <div class="flex items-center justify-between mb-24" style="gap:16px;flex-wrap:wrap;">
      <div class="tabs" id="tabs">
        <button class="tab active" data-filter="upcoming">Upcoming</button>
        <button class="tab" data-filter="all">All Events</button>
      </div>
      <div class="search-bar" style="max-width:300px;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
        <input type="text" id="search-input" placeholder="Search events…" />
      </div>
    </div>
    <div id="events-grid" class="list-stack">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>
  `;

  let allEvents = [];
  let currentFilter = 'upcoming';

  async function loadEvents() {
    const grid = document.getElementById('events-grid');
    grid.innerHTML = `<div class="loading-center"><div class="spinner"></div></div>`;
    try {
      const params = currentFilter === 'upcoming' ? { upcoming: 'true' } : {};
      const res    = await getEvents(params);
      allEvents    = res.results ?? res;
      renderEvents(allEvents);
    } catch {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Failed to load events</div>
        <div class="empty-text">Make sure the backend is running on localhost:8000</div>
      </div>`;
    }
  }

  function renderEvents(events) {
    const grid  = document.getElementById('events-grid');
    const query = document.getElementById('search-input').value.toLowerCase();
    const list  = events.filter(ev =>
      !query ||
      ev.title.toLowerCase().includes(query) ||
      (ev.location || '').toLowerCase().includes(query) ||
      (ev.club?.name || '').toLowerCase().includes(query)
    );

    if (list.length === 0) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📅</div>
        <div class="empty-title">No events found</div>
        <div class="empty-text">${query ? 'Try a different search term.' : 'No events available right now.'}</div>
      </div>`;
      return;
    }

    grid.innerHTML = list.map((ev, i) => `
      <a href="event-detail.html?id=${ev.id}" class="event-card-h">
        <div class="event-card-h-thumb" style="background:${eventGradient(i)};">${eventEmoji(ev.title)}</div>
        <div class="event-card-h-body">
          <div class="event-card-h-club">${ev.club?.name ?? ''}</div>
          <div class="event-card-h-title">${ev.title}</div>
          <div class="event-card-h-meta">
            <span>
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>
              ${formatDateTime(ev.starts_at)}
            </span>
            ${ev.location ? `<span>
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
              ${ev.location}
            </span>` : ''}
            <span>
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0"/></svg>
              ${ev.registration_count ?? 0} registered
            </span>
          </div>
        </div>
        <div class="event-card-h-right">
          <span class="badge ${ev.is_cancelled ? 'badge-cancelled' : new Date(ev.starts_at) > new Date() ? 'badge-upcoming' : 'badge-past'}">
            ${ev.is_cancelled ? 'Cancelled' : new Date(ev.starts_at) > new Date() ? 'Upcoming' : 'Past'}
          </span>
          ${ev.user_registration ? `<span class="badge badge-${ev.user_registration}">${ev.user_registration}</span>` : ''}
        </div>
      </a>
    `).join('');
  }

  // Tab switching
  document.getElementById('tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    loadEvents();
  });

  // Search
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => renderEvents(allEvents), 300);
  });

  loadEvents();
})();
</script>
</body>
</html>
