<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHub — Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
 
<div class="auth-page">
 
  <!-- Left -->
  <div class="auth-left">
    <div class="auth-brand">
      <div class="logo-icon">e</div>
      <h1>EventHub</h1>
      <p>Join your campus community. Browse clubs, register for events, and never miss what matters.</p>
    </div>
  </div>
 
  <!-- Right -->
  <div class="auth-right">
    <div class="auth-card">
 
      <div class="auth-title">Create account</div>
      <div class="auth-subtitle">Fill in your details to get started</div>
 
      <form id="signup-form" novalidate>
 
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
            </svg>
            <input type="text" id="username" placeholder="e.g. diana_m" autocomplete="username" required />
          </div>
          <div class="form-error" id="username-error">Username is required.</div>
        </div>
 
        <div class="form-group">
          <label class="form-label">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
            </svg>
            <input type="email" id="email" placeholder="you@school.edu" autocomplete="email" required />
          </div>
          <div class="form-error" id="email-error">Please enter a valid email.</div>
        </div>
 
        <!-- Student fields — always shown since all sign-ups are students -->
        <div class="form-group">
          <label class="form-label">Major</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 3.741-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5"/>
            </svg>
            <input type="text" id="major" placeholder="e.g. Computer Science" />
          </div>
        </div>
 
        <div class="form-group">
          <label class="form-label">Year Group</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/>
            </svg>
            <input type="number" id="year-group" placeholder="e.g. 2027" min="2020" max="2035" />
          </div>
        </div>
 
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
            </svg>
            <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
            <button type="button" class="input-toggle" id="toggle-pw">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="17" height="17">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
              </svg>
            </button>
          </div>
          <div class="form-error" id="pw-error">Password must be at least 8 characters.</div>
        </div>
 
        <div class="form-error" id="signup-error" style="margin-bottom:14px;font-size:0.85rem;"></div>
 
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="signup-btn">
          <span id="btn-label">Create Account</span>
          <div class="btn-loading" id="btn-spinner"></div>
        </button>
 
      </form>
 
      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign in</a>
      </div>
 
    </div>
  </div>
</div>
 
<div id="toast"></div>
 
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  redirectIfAuthed();
 
  // Password toggle
  const pwInput = document.getElementById('password');
  document.getElementById('toggle-pw').addEventListener('click', () => {
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  });
 
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => { t.className = ''; }, 3000);
  }
 
  const form      = document.getElementById('signup-form');
  const signupBtn = document.getElementById('signup-btn');
  const btnLabel  = document.getElementById('btn-label');
  const spinner   = document.getElementById('btn-spinner');
  const signupErr = document.getElementById('signup-error');
 
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
 
    const username  = document.getElementById('username').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const major     = document.getElementById('major').value.trim();
    const yearGroup = document.getElementById('year-group').value;
 
    // Clear errors
    ['username-error', 'email-error', 'pw-error'].forEach(id => {
      document.getElementById(id).classList.remove('show');
    });
    signupErr.textContent = '';
    signupErr.classList.remove('show');
 
    let valid = true;
    if (!username) { document.getElementById('username-error').classList.add('show'); valid = false; }
    if (!email || !/\S+@\S+\.\S+/.test(email)) { document.getElementById('email-error').classList.add('show'); valid = false; }
    if (!password || password.length < 8) { document.getElementById('pw-error').classList.add('show'); valid = false; }
    if (!valid) return;
 
    // Role is always student — club admins are assigned by the system admin only
    const payload = { username, email, password, role: 'student' };
    if (major)     payload.major      = major;
    if (yearGroup) payload.year_group = parseInt(yearGroup);
 
    signupBtn.disabled    = true;
    btnLabel.textContent  = 'Creating account…';
    spinner.style.display = 'block';
 
    try {
      await register(payload);
      const data = await login(email, password);
      saveTokens(data.access, data.refresh);
      showToast('Account created!', 'success');
      setTimeout(() => { window.location.href = 'home.html'; }, 700);
    } catch (err) {
      const msgs = err?.data;
      const msg  = typeof msgs === 'object'
        ? Object.values(msgs).flat().join(' ')
        : 'Registration failed. Please try again.';
      signupErr.textContent = msg;
      signupErr.classList.add('show');
      showToast('Registration failed.', 'error');
    } finally {
      signupBtn.disabled    = false;
      btnLabel.textContent  = 'Create Account';
      spinner.style.display = 'none';
    }
  });
</script>
</body>
</html>
